name: WASI

permissions: {}

on:
  workflow_call:
    inputs:
      changed:
        required: true
        type: boolean

jobs:
  run:
    name: WASI
    if: ${{ inputs.changed }}
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup Rust
        uses: oxc-project/setup-rust@3d6fb132fbe7cdcb66bf8ec193911c2945369d12 # v1.0.17
        with:
          tools: just
          cache-key: debug-build-wasi
          save-cache: ${{ github.ref_name == 'main' }}

      - uses: voidzero-dev/setup-vp@2dec1e33f4ab2c6d5bce1b0c4607961bb1a3f7a1 # v1.12.0
        with:
          version: '0.2.1'
          cache: true

      - name: Add WASI target
        run: rustup target add wasm32-wasip1-threads wasm32-wasip1

      # The two WASI flavors have distinct artifact names
      # (rolldown-binding.wasm32-wasi.wasm + .wasi.* loaders for threaded,
      # rolldown-binding.wasm32-wasip1.wasm + .wasip1.* loaders for
      # single-thread), so the builds co-exist in packages/rolldown/src.
      # Each build wires packages/rolldown/dist to its OWN flavor's loaders,
      # so every flavor's tests run right after its build: the threaded
      # smoke/stability tests genuinely exercise the threaded artifacts
      # (previously the single build overwrote them before any test ran,
      # leaving threaded WASI compile-checked only).
      - name: Build Rolldown with threaded WASI binding
        run: just build-rolldown-wasi

      # Assert the dist ships the COMPLETE threaded artifact set (a dropped
      # entry in copy-addon-plugin.ts otherwise publishes silently without it).
      - name: Assert threaded WASI dist file set
        run: node scripts/misc/check-wasi-dist-files.mjs threaded

      - name: Stability Test (threaded WASI)
        run: vp run --filter rolldown-tests test:stability

      - name: Build Rolldown with non-threaded WASI binding
        run: just build-rolldown-wasi-single

      # Same completeness guard for the single-thread set — this is the one
      # that ships the workerd `wasip1-deferred` loader.
      - name: Assert single-thread WASI dist file set
        run: node scripts/misc/check-wasi-dist-files.mjs single

      # Guard that the single-thread loaders are threadless end-to-end (no
      # Worker creation, no shared memory, asyncWorkPoolSize: 0). Mirrors the
      # napi-rs upstream guard for rolldown's own loaders.
      - name: Assert single-thread WASI loaders are threadless
        run: node scripts/misc/check-wasi-threadless.mjs

      # dev/*.test.ts files import this workspace package at module scope, so
      # collection fails without its dist/ even though the dev tests themselves
      # are skipped on this lane.
      - name: Build `@rolldown/test-dev-server`
        run: vp run --filter '@rolldown/test-dev-server' build

      # Full node suite against the single-thread WASI binding (the dist is
      # wired to the wasip1 loaders by `build-rolldown-wasi-single`). No lane
      # env vars: the artifact self-identifies through
      # `getRuntimeCapabilities()` -- it reports the CurrentThread flavor (all
      # `isSingleThread` skips apply) and the wasi target (all wasm-boundary
      # `isWasiTest` skips apply); see tests/src/runtime-flavor.ts.
      - name: Node Test (single-thread WASI)
        run: vp run --filter rolldown-tests test:main

      # `@example/typescript` is excluded because its config enables `devtools`, which currently
      # panics under WASI when the writer tries to open its log file (crates/rolldown_devtools/src/writer.rs).
      # `@example/native-magic-string` is excluded because it depends on a native-only addon.
      - name: Build Examples
        run: vp run --filter '@example/*' --filter '!@example/native-magic-string' --filter '!@example/typescript' build
