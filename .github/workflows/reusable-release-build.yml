name: Release Build

permissions: {}

on:
  workflow_dispatch:
  workflow_call:
    inputs:
      version:
        type: string
        default: 'noop'

jobs:
  build-binding:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: aarch64-linux-android
            build: vp run ci:build-release-binding --target aarch64-linux-android

    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    steps:
      - uses: taiki-e/checkout-action@7d1e50e93dc4fb3bba58f85018fadf77898aee8b # v1.4.2

      - name: Setup Rust
        uses: oxc-project/setup-rust@3d6fb132fbe7cdcb66bf8ec193911c2945369d12 # v1.0.17
        with:
          # No caching to avoid cache poisoning in release artifacts
          restore-cache: false
          save-cache: false

      - name: Rustup Adds Target
        run: rustup target add ${{ matrix.target }}

      - uses: mlugg/setup-zig@d1434d08867e3ee9daa34448df10607b98908d29 # v2.2.1
        if: ${{ contains(matrix.target, 'musl') }}
        with:
          version: 0.15.2

      - name: Setup OpenHarmony SDK
        if: ${{ contains(matrix.target, 'ohos') }}
        uses: Boshen/setup-ohos-sdk@edb865a89a712f1f15dbad932dfa9cfce849d95c # v1.0.0

      - uses: taiki-e/install-action@16b05812d776ae1dfaabc8277e421fb6d2506419 # v2.82.7
        if: ${{ contains(matrix.target, 'musl') }}
        env:
          GITHUB_TOKEN: ${{ github.token }}
        with:
          tool: cargo-zigbuild

      - uses: voidzero-dev/setup-vp@35171c92dd08b67d5a9d3f2a4327800e58396f2a # v1.13.0
        with:
          version: '0.2.1'
          cache: true

      - name: Build Binding
        run: ${{ matrix.build }}
        shell: bash
        env:
          TARGET_CC: clang # for mimalloc
          RUSTFLAGS: "-C target-cpu=generic"

      - name: Upload Binding Artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          if-no-files-found: error
          name: bindings-${{ matrix.target }}
          path: |
            packages/rolldown/src/rolldown-binding.*.node
            packages/rolldown/src/rolldown-binding.*.wasm

  build-freebsd:
    name: Build FreeBSD
    runs-on: ubuntu-latest
    steps:
      - uses: taiki-e/checkout-action@7d1e50e93dc4fb3bba58f85018fadf77898aee8b # v1.4.2
      - name: Build
        id: build
        uses: cross-platform-actions/action@5ea7e8e4677bd726033a10b094ba1c5762b15dee # v1.3.0
        env:
          DEBUG: napi:*
          RUSTUP_IO_THREADS: 1
        with:
          operating_system: freebsd
          version: '15.0'
          memory: 8G
          cpu_count: 3
          environment_variables: 'DEBUG RUSTUP_IO_THREADS'
          shell: bash
          run: |
            sudo pkg install -y -f curl node libnghttp2 npm cmake
            curl https://sh.rustup.rs -sSf --output rustup.sh
            sh rustup.sh -y --profile minimal --default-toolchain stable
            source "$HOME/.cargo/env"
            rustup toolchain install
            echo "~~~~ rustc --version ~~~~"
            rustc --version
            echo "~~~~ node -v ~~~~"
            node -v
            pwd
            ls -lah
            whoami
            env
            sudo corepack enable
            sudo npm i -g corepack@latest # use a newer corepack due to https://github.com/nodejs/corepack/issues/612
            pnpm install --ignore-scripts
            pnpm run ci:build-release-binding --target x86_64-unknown-freebsd
            rm -rf node_modules
            rm -rf target
      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: bindings-x86_64-unknown-freebsd
          path: ./packages/rolldown/src/rolldown-binding.*.node
          if-no-files-found: error

  build-node-packages:
    strategy:
      fail-fast: false
    name: Build Node Package
    runs-on: namespace-profile-linux-x64-default
    env:
      RELEASING: 'true'
    steps:
      - uses: taiki-e/checkout-action@7d1e50e93dc4fb3bba58f85018fadf77898aee8b # v1.4.2

      - uses: voidzero-dev/setup-vp@35171c92dd08b67d5a9d3f2a4327800e58396f2a # v1.13.0
        with:
          version: '0.2.1'
          cache: true

      - name: Build Node binding
        # This binary is only used to build the node package itself. It's won't be published.
        run: vp run --filter rolldown build-binding

      - name: Determine Version
        if: ${{ inputs.version != 'noop' }}
        run: node --import @oxc-node/core/register ./scripts/misc/bump-version.js ${ROLLDOWN_VERSION}
        env:
          ROLLDOWN_VERSION: ${{ inputs.version }}

      - name: Build Node Packages
        # Binaries are built in the previous steps. Unlike in local development, we only need to build the node package itself.
        run: vp run --filter rolldown build-node

      - name: Upload Node Artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          if-no-files-found: error
          name: node-artifact
          path: |
            packages/rolldown/dist/**

      - name: Upload `rolldown-version.txt`
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          if-no-files-found: warn
          name: rolldown-version
          path: |
            rolldown-version.txt

  build-rolldown-browser:
    strategy:
      fail-fast: false
    name: Build `@rolldown/browser` Package
    runs-on: namespace-profile-linux-x64-default
    steps:
      - uses: taiki-e/checkout-action@7d1e50e93dc4fb3bba58f85018fadf77898aee8b # v1.4.2

      - name: Setup Rust
        uses: oxc-project/setup-rust@3d6fb132fbe7cdcb66bf8ec193911c2945369d12 # v1.0.17
        with:
          # No caching to avoid cache poisoning in release artifacts
          restore-cache: false
          save-cache: false

      - name: Add WASI target
        run: rustup target add wasm32-wasip1-threads

      - uses: voidzero-dev/setup-vp@35171c92dd08b67d5a9d3f2a4327800e58396f2a # v1.13.0
        with:
          version: '0.2.1'
          cache: true

      - name: Build Node binding
        # This binary is only used to build the node package itself. It's won't be published.
        run: vp run --filter rolldown build-binding

      - name: Determine Version
        if: ${{ inputs.version != 'noop' }}
        run: node --import @oxc-node/core/register ./scripts/misc/bump-version.js ${ROLLDOWN_VERSION}
        env:
          ROLLDOWN_VERSION: ${{ inputs.version }}

      - name: Build `@rolldown/browser`
        # Binaries are built in the previous steps. Unlike in local development, we only need to build the node package itself.
        run: vp run --filter "@rolldown/browser" build:release

      - name: Upload `@rolldown/browser` Artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          if-no-files-found: error
          name: browser-artifact
          path: |
            packages/browser/dist/**

  build-rolldown-debug:
    strategy:
      fail-fast: false
    name: Build `@rolldown/debug` Package
    runs-on: namespace-profile-linux-x64-default
    steps:
      - uses: taiki-e/checkout-action@7d1e50e93dc4fb3bba58f85018fadf77898aee8b # v1.4.2

      - name: Setup Rust
        uses: oxc-project/setup-rust@3d6fb132fbe7cdcb66bf8ec193911c2945369d12 # v1.0.17
        with:
          # No caching to avoid cache poisoning in release artifacts
          restore-cache: false
          save-cache: false

      - uses: voidzero-dev/setup-vp@35171c92dd08b67d5a9d3f2a4327800e58396f2a # v1.13.0
        with:
          version: '0.2.1'
          cache: true

      - name: Build `@rolldown/debug`
        # This binary is only used to build the node package itself. It's won't be published.
        run: vp run --filter "@rolldown/debug" build

      - name: Upload `@rolldown/debug` Artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          if-no-files-found: error
          name: debug-artifact
          path: |
            packages/debug/dist/**
